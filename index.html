<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>Internet City — Build the Future</title>
  <link rel="stylesheet" href="src/v2/shared/base.css" />
</head>
<body>
  <div id="app"></div>
  <script>
    // Unregister any old service workers so stale V1 cache doesn't block V2
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
      caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    }
  </script>
  <script type="module" src="src/v2/main.js"></script>
</body>
</html>
